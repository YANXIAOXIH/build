name: Build som3588
on:
  workflow_dispatch:
    inputs:
      armbian_release:
        description: "RELEASE"
        required: true
        default: "bookworm"
        type: choice
        options:
          - bookworm
          - trixie

jobs:
  build-armbian:
    runs-on: ubuntu-latest
    steps:
      - uses: YANXIAOXIH/build@main
        with:
          armbian_release:   "${{ inputs.armbian_release }}"                        # userspace
          armbian_target:    "build"                        # build=image, kernel=kernel
          armbian_board:     "som3588-cat"                   # build target
